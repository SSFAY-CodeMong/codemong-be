version: '3.8'

services:
  mariadb:
    image: mariadb:10.11
    container_name: local-mariadb
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${ROOT_PW}
      MYSQL_DATABASE: codemong_db
      MYSQL_USER: codemong_user
      MYSQL_PASSWORD: ${MYSQL_PW}
    volumes:
      - mariadb_data:/var/lib/mysql
    restart: always

  redis:
    image: redis:7
    container_name: local-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PW}
    volumes:
      - redis_data:/data
    restart: always

volumes:
  mariadb_data:
  redis_data: