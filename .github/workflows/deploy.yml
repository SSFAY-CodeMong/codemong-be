name: EC2 자동배포

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build Spring Boot jar
        run: ./gradlew clean build -x test

      - name: Rename jar
        run: |
          JAR_FILE=$(ls build/libs/*.jar | grep -v plain | head -n 1)
          echo "Found jar: $JAR_FILE"
          cp "$JAR_FILE" app-new.jar

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/codemong-key.pem
          chmod 600 ~/.ssh/codemong-key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Upload jar to EC2
        run: |
          scp -i ~/.ssh/codemong-key.pem \
            -P ${{ secrets.EC2_PORT }} \
            app-new.jar \
            ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:/home/ubuntu/codemong/backend/app-new.jar

      - name: Deploy and restart service
        run: |
          ssh -i ~/.ssh/codemong-key.pem \
            -p ${{ secrets.EC2_PORT }} \
            ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} << 'EOF'
              set -e

              cd /home/ubuntu/codemong/backend

              if [ -f app.jar ]; then
                cp app.jar app-backup.jar
              fi

              mv app-new.jar app.jar

              sudo systemctl restart codemong

              sleep 5

              sudo systemctl status codemong --no-pager

              curl -f http://localhost:8080 || true
          EOF